<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="carousel">
      <div class="slides">
        <div class="slide active">
          <a href="#soon">
            <img src="./Easy/Easy.png" alt="" />
          </a>
          <div class="caption">
            <h2>Easy Assignment</h2>
            <p>Click to open first assignment</p>
          </div>
        </div>

        <div class="slide">
          <a href="./Medium/Food.html">
            <img src="./Medium/Medium.png" alt="" />
          </a>
          <div class="caption">
            <h2>Medium Assignment</h2>
            <p>Click to open second assignment</p>
          </div>
        </div>

        <div class="slide">
          <a href="#soon">
            <img src="./Hard/Hard.png" alt="" />
          </a>
          <div class="caption">
            <h2>Hard Assignment</h2>
            <p>Click to open third assignment</p>
          </div>
        </div>
      </div>

      <button class="prev">&#10094;</button>
      <button class="next">&#10095;</button>

      <div class="dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
